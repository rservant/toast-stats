apiVersion: apps/v1
kind: Deployment
metadata:
  name: club-health-frontend
  namespace: club-health
  labels:
    app: club-health-frontend
    component: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: club-health-frontend
  template:
    metadata:
      labels:
        app: club-health-frontend
        component: web
    spec:
      containers:
      - name: frontend
        image: club-health/frontend:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: BACKEND_URL
          value: "http://club-health-backend-service:5001"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            add:
            - CHOWN
            - SETGID
            - SETUID

---
apiVersion: v1
kind: Service
metadata:
  name: club-health-frontend-service
  namespace: club-health
  labels:
    app: club-health-frontend
spec:
  selector:
    app: club-health-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: club-health-ingress
  namespace: club-health
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - club-health.yourdomain.com
    secretName: club-health-tls
  rules:
  - host: club-health.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: club-health-backend-service
            port:
              number: 5001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: club-health-frontend-service
            port:
              number: 80